<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="sitenova-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Orbit Rings -->
  <circle cx="256" cy="256" r="220" stroke="url(#sitenova-grad)" stroke-width="12" stroke-dasharray="16 16" opacity="0.4" />
  <circle cx="256" cy="256" r="190" stroke="url(#sitenova-grad)" stroke-width="6" opacity="0.2" />

  <!-- Stylized Geometric "Nova" star -->
  <!-- Main vertical/horizontal points -->
  <path d="M256 60 C256 180 180 256 60 256 C180 256 256 320 256 452 C256 320 320 256 452 256 C320 256 256 180 256 60 Z" fill="url(#sitenova-grad)" />
  
  <!-- Diagonal smaller points for depth -->
  <path d="M256 130 C256 210 210 256 130 256 C210 256 256 300 256 382 C256 300 300 256 382 256 C300 256 256 210 256 130 Z" fill="url(#sitenova-grad)" opacity="0.7" />

  <!-- Core bright star glow -->
  <circle cx="256" cy="256" r="30" fill="#ffffff" filter="url(#glow)" />
  <circle cx="256" cy="256" r="14" fill="#ffffff" />
</svg>
