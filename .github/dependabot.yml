version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      vite-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions

